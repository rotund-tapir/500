# Draft fdroiddata recipe for https://gitlab.com/fdroid/fdroiddata
# (destination: metadata/io.github.rotundtapir.fivehundred.yml).
# Tracked here until the inclusion MR is opened — see issue #18.
# NOTE: the fdroiddata copy must be COMMENT-FREE — their CI runs `fdroid rewritemeta`
# (which strips comments) and fails if the checked-in file differs. Of ~6,300 recipes
# in fdroiddata, none carry comments. This annotated copy stays the working reference;
# regenerate the MR copy with `fdroid rewritemeta` after any edit here.
#
# Notes for the submission:
# - Summary/Description are deliberately omitted: F-Droid reads the localized
#   fastlane metadata (fastlane/metadata/android/en-US/) straight from this repo,
#   including changelogs and screenshots.
# - License: the repo is GPL-3.0-or-later with an additional GPLv3 §7 permission
#   (LICENSE-EXCEPTION.md) allowing the *play* flavor to link Google Ads/Billing.
#   The foss flavor F-Droid builds contains none of that code, so plain
#   GPL-3.0-or-later is the accurate SPDX id here; mention the exception in the
#   MR description if the reviewer asks.
# - Anti-features: none expected. No ads/tracking in foss; online multiplayer is
#   optional, off by default, and the server is GPL + self-hostable (docs/self-hosting.md),
#   so NonFreeNet does not apply.
# - The Gradle daemon toolchain is pinned to Java 21 via
#   gradle/gradle-daemon-jvm.properties (vendor-agnostic); AGP fails on JDK 25+.
#   The sudo: block below installs/selects JDK 21 on the buildserver — verify the
#   exact package/paths against the current F-Droid buildserver image when running
#   `fdroid build` locally.
# - Verified 2026-07-22 with fdroidserver 2.4.5 (`fdroid build -l`, sudo block
#   skipped — host already on JDK 21): builds green, scanner clean (needs the
#   prebuild + scandelete below), and the rebuild matched the v0.4.1 GitHub
#   release asset from Binaries: with the allowed signer — the full reproducible
#   publishing flow (#22), now including the GIT_COMMIT --short=8 pin (c67db2b).
#   The versionCode-11 `fdroid signatures` output lives only in the fdroiddata
#   branch (metadata/io.github.rotundtapir.fivehundred/signatures/11/) — it can be
#   regenerated from the public release APK at any time (`fdroid signatures <url>`),
#   so the binary blobs are no longer committed here. The docs/fdroid scandelete is
#   still REQUIRED while the built commit is v0.4.1 (that tag contains the blobs);
#   build blocks for later tags can drop it.

Categories:
  - Card Game
License: GPL-3.0-or-later
AuthorName: rotund_tapir
SourceCode: https://github.com/rotundtapir/500
IssueTracker: https://github.com/rotundtapir/500/issues
Changelog: https://github.com/rotundtapir/500/releases
Liberapay: rotund-tapir

RepoType: git
Repo: https://github.com/rotundtapir/500.git
# Reproducible builds (#22): F-Droid rebuilds from source, checks the result against this
# release asset, and publishes the upstream-signed APK — same signature as GitHub releases.
Binaries: https://github.com/rotundtapir/500/releases/download/v%v/app-foss-release.apk

Builds:
  - versionName: 0.4.1
    versionCode: 11
    commit: v0.4.1
    subdir: app
    submodules: true
    sudo:
      - apt-get update || apt-get update
      - apt-get install -y -t bookworm-backports openjdk-21-jdk-headless
      - update-alternatives --auto java
    gradle:
      - foss
    # The scanner flags the foojay toolchain resolver (downloads JDKs at build time);
    # the buildserver's JDK 21 (sudo block above) satisfies the toolchain pin locally.
    prebuild: sed -i -e '/foojay-resolver/d' ../settings.gradle.kts
    # Proprietary ads/billing live in this play-flavor-only cardkit module; the foss
    # flavor never resolves it, so delete it to keep the source tree scanner-clean.
    # docs/fdroid is this recipe's staging copy in-repo — its signatures/ dir holds
    # binary APKSigningBlock files the scanner would otherwise flag.
    scandelete:
      - cardkit/cardkit-monetization-play
      - docs/fdroid

# The release signing key (v2 scheme only). Only APKs signed with this cert may be published.
AllowedAPKSigningKeys: 86c486105ed5062b90815fec97311029ab5569735926c323c7896c8d64b78d65

AutoUpdateMode: Version
UpdateCheckMode: Tags ^v[0-9]
# versionCode/versionName live in gradle.properties (build.gradle.kts reads them
# via providers.gradleProperty), so point checkupdates at that file explicitly:
UpdateCheckData: gradle.properties|appVersionCode=(\d+)|gradle.properties|appVersionName=(.+)

CurrentVersion: 0.4.1
CurrentVersionCode: 11
